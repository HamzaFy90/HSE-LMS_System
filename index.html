<!DOCTYPE html>
<html lang="en">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>SafeLearn Pro - HSE LMS</title>
 <script src="https://cdn.tailwindcss.com"></script>
 <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
 <style>
  ::-webkit-scrollbar {
   width: 6px;
   height: 6px;
  }

  ::-webkit-scrollbar-track {
   background: #f1f5f9;
  }

  ::-webkit-scrollbar-thumb {
   background: #cbd5e1;
   border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
   background: #94a3b8;
  }

  .fade-in {
   animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
   from {
    opacity: 0;
    transform: translateY(10px);
   }

   to {
    opacity: 1;
    transform: translateY(0);
   }
  }

  /* Prevent body scroll when mobile menu is open */
  .no-scroll {
   overflow: hidden;
  }
 </style>
</head>

<body class="bg-slate-50 text-slate-800 font-sans flex h-screen overflow-hidden relative">

 <!-- Mobile Dark Overlay -->
 <div id="mobile-overlay"
  class="fixed inset-0 bg-slate-900/60 z-20 hidden md:hidden backdrop-blur-sm transition-opacity"
  onclick="toggleSidebar()"></div>

 <!-- Sidebar Navigation (Off-canvas on mobile, fixed on desktop) -->
 <aside id="sidebar"
  class="fixed md:static inset-y-0 left-0 w-64 bg-slate-900 text-white flex flex-col h-full shadow-2xl z-30 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out flex-shrink-0">
  <div class="p-5 md:p-6 border-b border-slate-800 flex justify-between items-center">
   <div>
    <h1
     class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400 flex items-center">
     <i class="fas fa-shield-alt mr-2 text-emerald-400"></i>SafeLearn
    </h1>
    <p class="text-xs text-slate-400 mt-1 uppercase tracking-widest font-semibold">Pro Edition v4</p>
   </div>
   <!-- Mobile Close Button -->
   <button class="md:hidden text-slate-400 hover:text-white p-2" onclick="toggleSidebar()">
    <i class="fas fa-times text-xl"></i>
   </button>
  </div>
  <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
   <button onclick="nav('dashboard')" id="nav-dashboard"
    class="nav-btn w-full flex items-center text-left px-4 py-3 bg-indigo-600 text-white rounded-xl shadow-md transition text-sm font-semibold">
    <i class="fas fa-chart-pie mr-3 w-5 text-center"></i> Dashboard
   </button>
   <button onclick="nav('creator')" id="nav-creator"
    class="nav-btn w-full flex items-center text-left px-4 py-3 hover:bg-slate-800 text-slate-300 rounded-xl transition text-sm font-semibold">
    <i class="fas fa-paint-brush mr-3 w-5 text-center"></i> Module Builder
   </button>
   <button onclick="nav('data')" id="nav-data"
    class="nav-btn w-full flex items-center text-left px-4 py-3 hover:bg-slate-800 text-slate-300 rounded-xl transition text-sm font-semibold">
    <i class="fas fa-database mr-3 w-5 text-center"></i> Import / Export
   </button>
  </nav>
 </aside>

 <!-- Main Content Wrapper -->
 <div class="flex-1 flex flex-col h-full overflow-hidden relative w-full">

  <!-- Mobile Top Header -->
  <header
   class="md:hidden bg-white shadow-sm border-b border-slate-200 px-4 py-3 flex justify-between items-center z-10 flex-shrink-0">
   <h1
    class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-emerald-500 flex items-center">
    <i class="fas fa-shield-alt mr-2 text-emerald-500"></i>SafeLearn
   </h1>
   <button onclick="toggleSidebar()"
    class="text-slate-600 hover:text-indigo-600 focus:outline-none p-2 rounded-lg bg-slate-50 border border-slate-200">
    <i class="fas fa-bars text-xl"></i>
   </button>
  </header>

  <!-- Dynamic Views Container -->
  <main class="flex-1 h-full overflow-y-auto relative bg-slate-50" id="main-content">
   <!-- Views injected here via JS -->
  </main>
 </div>

 <script>
  // --- Core Data & State Management ---
  const defaultTopics = [
   {
    id: 't-builtin-1',
    title: 'NEBOSH Command Words',
    description: 'Master the difference between Outline, Describe, and Explain for the IG1 open-book exam.',
    type: 'Built-in',
    bestScore: null,
    questions: [
     { q: "What does 'Outline' require in an exam?", options: ["A single word", "A brief summary in a full sentence", "A detailed paragraph", "Just a bullet point"], correct: 1, exp: "'Outline' requires brief summaries in full sentences. Single words get zero marks." },
     { q: "Which word requires a detailed written account of distinctive features?", options: ["Identify", "Explain", "Describe", "Give"], correct: 2, exp: "Describe means to 'paint a picture in words', providing detail beyond a simple outline." }
    ]
   }
  ];

  let topics = [];
  let currentTopic = null;
  let quizState = { index: 0, score: 0 };
  let draftModule = { id: null, title: '', description: '', questions: [] };
  let sidebarOpen = false;

  function initApp() {
   try {
    const stored = localStorage.getItem('safeLearnDataV4');
    if (stored) { topics = JSON.parse(stored); }
    else { topics = JSON.parse(JSON.stringify(defaultTopics)); saveData(); }
   } catch (e) { topics = JSON.parse(JSON.stringify(defaultTopics)); }
   nav('dashboard');
  }

  function saveData() { localStorage.setItem('safeLearnDataV4', JSON.stringify(topics)); }

  // --- Responsive UI Logic ---
  function toggleSidebar() {
   const sidebar = document.getElementById('sidebar');
   const overlay = document.getElementById('mobile-overlay');
   sidebarOpen = !sidebarOpen;

   if (sidebarOpen) {
    sidebar.classList.remove('-translate-x-full');
    overlay.classList.remove('hidden');
    document.body.classList.add('no-scroll');
   } else {
    sidebar.classList.add('-translate-x-full');
    overlay.classList.add('hidden');
    document.body.classList.remove('no-scroll');
   }
  }

  function closeSidebarOnMobile() {
   if (window.innerWidth < 768 && sidebarOpen) {
    toggleSidebar();
   }
  }

  function nav(view) {
   closeSidebarOnMobile(); // Auto-close menu on mobile when navigating

   document.querySelectorAll('.nav-btn').forEach(btn => btn.className = "nav-btn w-full flex items-center text-left px-4 py-3 hover:bg-slate-800 text-slate-300 rounded-xl transition text-sm font-semibold");
   const activeBtn = document.getElementById(`nav-${view === 'player' || view === 'results' ? 'dashboard' : view}`);
   if (activeBtn) activeBtn.className = "nav-btn w-full flex items-center text-left px-4 py-3 bg-indigo-600 text-white rounded-xl shadow-md transition text-sm font-semibold";

   const main = document.getElementById('main-content');
   if (view === 'dashboard') renderDashboard(main);
   if (view === 'creator') { resetDraft(); renderCreator(main); }
   if (view === 'data') renderDataHub(main);
   if (view === 'player') renderPlayer(main);
   if (view === 'results') renderResults(main);
  }

  // --- View 1: Dashboard ---
  function renderDashboard(container) {
   const total = topics.length;
   const customCount = topics.filter(t => t.type === 'Custom').length;
   const attempted = topics.filter(t => t.bestScore !== null).length;

   let totalQs = 0; let totalScore = 0;
   topics.forEach(t => {
    if (t.bestScore !== null) { totalQs += t.questions.length; totalScore += t.bestScore; }
   });
   const mastery = totalQs > 0 ? Math.round((totalScore / totalQs) * 100) : 0;

   const renderCard = (topic) => {
    const qCount = topic.questions.length;
    const scoreBadge = topic.bestScore !== null
     ? `<span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-2 py-1 rounded shadow-sm flex items-center whitespace-nowrap"><i class="fas fa-check-circle mr-1"></i> ${topic.bestScore}/${qCount}</span>`
     : `<span class="bg-slate-100 text-slate-500 text-xs font-bold px-2 py-1 rounded shadow-sm whitespace-nowrap">Untested</span>`;

    const isCustom = topic.type === 'Custom';
    const tagColor = isCustom ? 'bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-sm' : 'bg-slate-200 text-slate-700';

    return `
                    <div class="bg-white rounded-2xl p-5 md:p-6 border ${isCustom ? 'border-purple-200 shadow-md' : 'border-slate-200 shadow-sm'} hover:shadow-xl hover:-translate-y-1 transition-all duration-300 flex flex-col justify-between group fade-in">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="${tagColor} text-[10px] md:text-xs font-bold px-2.5 py-1 rounded-full uppercase tracking-wider flex items-center">
                                    ${isCustom ? '<i class="fas fa-star text-yellow-300 mr-1"></i> Custom' : 'Built-in'}
                                </span>
                                ${isCustom ? `
                                    <div class="flex space-x-1 md:space-x-2 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                                        <button onclick="editTopic('${topic.id}')" class="text-slate-400 hover:text-indigo-500 transition p-1" title="Edit"><i class="fas fa-edit"></i></button>
                                        <button onclick="deleteTopic('${topic.id}')" class="text-slate-400 hover:text-red-500 transition p-1 ml-1" title="Delete"><i class="fas fa-trash"></i></button>
                                    </div>` : ''}
                            </div>
                            <h3 class="text-lg md:text-xl font-bold text-slate-800 mb-2 leading-tight">${topic.title}</h3>
                            <p class="text-slate-500 text-xs md:text-sm mb-4 line-clamp-2">${topic.description}</p>
                        </div>
                        <div>
                            <div class="flex justify-between items-center mb-4 md:mb-5 border-t border-slate-100 pt-3 md:pt-4">
                                <span class="text-slate-400 text-xs md:text-sm font-medium"><i class="fas fa-layer-group mr-1"></i> ${qCount} Qs</span>
                                ${scoreBadge}
                            </div>
                            <button onclick="startTopic('${topic.id}')" class="w-full ${isCustom ? 'bg-purple-600 hover:bg-purple-700' : 'bg-slate-900 hover:bg-indigo-600'} text-white font-bold py-2.5 md:py-3 rounded-xl transition-colors shadow flex justify-center items-center text-sm md:text-base">
                                Start Module <i class="fas fa-play ml-2 text-xs"></i>
                            </button>
                        </div>
                    </div>`;
   };

   container.innerHTML = `
                <div class="p-4 md:p-8 max-w-7xl mx-auto pb-20">
                    <!-- Analytics Header (Responsive Grid) -->
                    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6 md:mb-10 fade-in">
                        <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center">
                            <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase mb-1">Total Library</p>
                            <div class="flex items-center"><i class="fas fa-book-open text-indigo-500 text-xl md:text-2xl mr-2 md:mr-3"></i><span class="text-2xl md:text-3xl font-black text-slate-800">${total}</span></div>
                        </div>
                        
                        <div class="bg-gradient-to-br from-purple-600 to-indigo-700 p-4 md:p-5 rounded-2xl shadow-md flex flex-col justify-center transform lg:hover:scale-105 transition duration-300">
                            <p class="text-[10px] md:text-xs font-bold text-purple-200 uppercase mb-1 line-clamp-1">Custom Modules</p>
                            <div class="flex items-center"><i class="fas fa-hammer text-yellow-400 text-xl md:text-2xl mr-2 md:mr-3"></i><span class="text-2xl md:text-3xl font-black text-white">${customCount}</span></div>
                        </div>

                        <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center">
                            <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase mb-1">Attempted</p>
                            <div class="flex items-center"><i class="fas fa-tasks text-emerald-500 text-xl md:text-2xl mr-2 md:mr-3"></i><span class="text-2xl md:text-3xl font-black text-slate-800">${attempted}</span></div>
                        </div>
                        
                        <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center">
                            <p class="text-[10px] md:text-xs font-bold text-slate-400 uppercase mb-1">Total Mastery</p>
                            <div class="flex items-center"><i class="fas fa-award text-blue-500 text-xl md:text-2xl mr-2 md:mr-3"></i><span class="text-2xl md:text-3xl font-black text-slate-800">${mastery}%</span></div>
                        </div>
                    </div>
                    
                    <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 mb-4 md:mb-6">Your Course Library</h2>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                        ${topics.map(renderCard).join('')}
                    </div>
                </div>`;
  }

  // --- View 2: Module Builder ---
  function resetDraft() { draftModule = { id: null, title: '', description: '', questions: [] }; }

  function editTopic(id) {
   const t = topics.find(x => x.id === id);
   if (t) { draftModule = JSON.parse(JSON.stringify(t)); nav('creator'); renderCreator(document.getElementById('main-content')); }
  }

  function renderCreator(container) {
   container.innerHTML = `
                <div class="p-4 md:p-8 max-w-6xl mx-auto pb-20 fade-in">
                    <div class="flex flex-col sm:flex-row justify-between sm:items-center mb-6 gap-4">
                        <div>
                            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 leading-tight">${draftModule.id ? 'Edit Module' : 'Build Custom Module'}</h2>
                            <p class="text-sm md:text-base text-slate-500 mt-1">Add questions manually to test your HSE knowledge.</p>
                        </div>
                        <button onclick="saveModuleToLibrary()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-6 py-3 rounded-xl shadow-md transition flex items-center justify-center w-full sm:w-auto">
                            <i class="fas fa-save mr-2"></i> Save Module
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 md:gap-8">
                        <!-- Left Col: Module Info & Question List -->
                        <div class="lg:col-span-1 space-y-6">
                            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 class="font-bold text-slate-700 mb-3 border-b pb-2 text-sm md:text-base">Module Details</h3>
                                <input type="text" id="draft-title" placeholder="Module Title (e.g. Fire Safety)" value="${draftModule.title}" class="w-full border border-slate-300 rounded-lg p-3 mb-3 focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-slate-800 text-sm md:text-base" onchange="draftModule.title = this.value">
                                <textarea id="draft-desc" placeholder="Short Description..." rows="3" class="w-full border border-slate-300 rounded-lg p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-xs md:text-sm" onchange="draftModule.description = this.value">${draftModule.description}</textarea>
                            </div>
                            
                            <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 class="font-bold text-slate-700 mb-3 border-b pb-2 flex justify-between items-center text-sm md:text-base">
                                    Added Questions <span class="bg-indigo-100 text-indigo-800 px-2.5 py-0.5 rounded-full text-xs font-black" id="draft-q-count">${draftModule.questions.length}</span>
                                </h3>
                                <div id="draft-questions-list" class="space-y-2 md:space-y-3 max-h-60 md:max-h-80 overflow-y-auto pr-1 md:pr-2 custom-scrollbar">
                                    <!-- List renders here -->
                                </div>
                            </div>
                        </div>

                        <!-- Right Col: Add Question Form -->
                        <div class="lg:col-span-2 bg-white p-5 md:p-8 rounded-2xl shadow-md border border-purple-100 relative">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-purple-500 to-indigo-500 rounded-t-2xl"></div>
                            <h3 class="text-lg md:text-xl font-bold text-indigo-900 mb-5 md:mb-6"><i class="fas fa-plus-circle mr-2 text-purple-500"></i>Add New Question</h3>
                            
                            <div class="space-y-4 md:space-y-5">
                                <div>
                                    <label class="block text-xs md:text-sm font-bold text-slate-700 mb-1">Question Text</label>
                                    <textarea id="nq-text" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base" placeholder="Enter the exam question..."></textarea>
                                </div>
                                
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Option A</label><input type="text" id="nq-o0" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 md:p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Option B</label><input type="text" id="nq-o1" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 md:p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Option C</label><input type="text" id="nq-o2" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 md:p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base"></div>
                                    <div><label class="block text-xs font-bold text-slate-500 mb-1">Option D</label><input type="text" id="nq-o3" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 md:p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base"></div>
                                </div>

                                <div class="pt-2 border-t border-slate-100">
                                    <label class="block text-xs md:text-sm font-bold text-emerald-600 mb-1"><i class="fas fa-check mr-1"></i> Correct Answer</label>
                                    <select id="nq-correct" class="w-full bg-emerald-50 border border-emerald-200 text-emerald-800 font-bold rounded-lg p-2.5 md:p-3 focus:ring-2 focus:ring-emerald-500 outline-none cursor-pointer text-sm md:text-base">
                                        <option value="0">Option A is Correct</option><option value="1">Option B is Correct</option><option value="2">Option C is Correct</option><option value="3">Option D is Correct</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-xs md:text-sm font-bold text-slate-700 mb-1">Learning Explanation</label>
                                    <textarea id="nq-exp" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 outline-none text-sm md:text-base" placeholder="Why is this answer correct?"></textarea>
                                </div>

                                <button onclick="addDraftQuestion()" class="w-full bg-slate-900 hover:bg-purple-600 text-white font-bold py-3 md:py-4 rounded-xl transition shadow flex justify-center items-center text-sm md:text-base">
                                    <i class="fas fa-arrow-down mr-2"></i> Append Question to Module
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
   renderDraftList();
  }

  function addDraftQuestion() {
   const q = document.getElementById('nq-text').value.trim();
   const o0 = document.getElementById('nq-o0').value.trim();
   const o1 = document.getElementById('nq-o1').value.trim();
   const o2 = document.getElementById('nq-o2').value.trim();
   const o3 = document.getElementById('nq-o3').value.trim();
   const correct = parseInt(document.getElementById('nq-correct').value);
   const exp = document.getElementById('nq-exp').value.trim();

   if (!q || !o0 || !o1 || !o2 || !o3 || !exp) { alert("Missing Data: Please fill in all fields."); return; }

   draftModule.questions.push({ q, options: [o0, o1, o2, o3], correct, exp });
   ['nq-text', 'nq-o0', 'nq-o1', 'nq-o2', 'nq-o3', 'nq-exp'].forEach(id => document.getElementById(id).value = '');
   document.getElementById('nq-correct').value = '0';
   renderDraftList();
  }

  function removeDraftQuestion(idx) { draftModule.questions.splice(idx, 1); renderDraftList(); }

  function renderDraftList() {
   const list = document.getElementById('draft-questions-list');
   document.getElementById('draft-q-count').innerText = draftModule.questions.length;

   if (draftModule.questions.length === 0) {
    list.innerHTML = `<p class="text-xs md:text-sm text-slate-400 italic text-center py-4 bg-slate-50 rounded-lg border border-dashed border-slate-300">No questions added yet.</p>`;
    return;
   }

   list.innerHTML = draftModule.questions.map((q, idx) => `
                <div class="bg-white p-2.5 md:p-3 rounded-xl border border-slate-200 shadow-sm flex justify-between items-start group hover:border-indigo-300 transition">
                    <div class="pr-2 w-full">
                        <span class="text-[10px] md:text-xs font-black text-white bg-indigo-500 rounded px-1.5 py-0.5 mr-1 align-middle">Q${idx + 1}</span> 
                        <span class="text-xs md:text-sm text-slate-700 font-bold line-clamp-2 mt-1 inline-block align-middle w-[85%]">${q.q}</span>
                    </div>
                    <button onclick="removeDraftQuestion(${idx})" class="text-slate-300 hover:text-red-500 p-1 rounded transition flex-shrink-0"><i class="fas fa-trash text-sm md:text-base"></i></button>
                </div>
            `).join('');
  }

  function saveModuleToLibrary() {
   if (!draftModule.title.trim()) { alert("Please provide a Title."); return; }
   if (draftModule.questions.length === 0) { alert("Add at least one question."); return; }

   let finalModule = JSON.parse(JSON.stringify(draftModule));
   if (finalModule.id) {
    const idx = topics.findIndex(t => t.id === finalModule.id);
    if (idx !== -1) topics[idx] = finalModule;
   } else {
    finalModule.id = 't-custom-' + Date.now();
    finalModule.type = 'Custom';
    finalModule.bestScore = null;
    topics.push(finalModule);
   }
   saveData(); nav('dashboard');
  }

  function deleteTopic(id) {
   if (confirm("Delete this module forever?")) {
    topics = topics.filter(t => t.id !== id);
    saveData(); nav('dashboard');
   }
  }

  // --- View 3: Data Hub ---
  function renderDataHub(container) {
   container.innerHTML = `
                <div class="p-4 md:p-8 max-w-4xl mx-auto fade-in">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2">Import / Export JSON</h2>
                    <p class="text-sm md:text-base text-slate-500 mb-6 md:mb-8">Backup your custom modules to keep them safe.</p>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8">
                        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h3 class="text-base md:text-lg font-bold text-slate-800 mb-3 md:mb-4 flex items-center"><i class="fas fa-file-upload text-indigo-500 mr-2"></i> Upload File</h3>
                            <label class="flex flex-col items-center justify-center w-full h-28 md:h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-indigo-50 hover:border-indigo-400 transition">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                    <i class="fas fa-cloud-upload-alt text-2xl md:text-3xl text-slate-400 mb-2"></i>
                                    <p class="text-xs md:text-sm text-slate-500 font-semibold">Tap to browse files</p>
                                </div>
                                <input type="file" class="hidden" accept=".json" onchange="handleFileUpload(event)" />
                            </label>
                        </div>
                        <div class="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                            <div>
                                <h3 class="text-base md:text-lg font-bold text-slate-800 mb-2 flex items-center"><i class="fas fa-file-download text-purple-500 mr-2"></i> Backup Library</h3>
                                <p class="text-xs md:text-sm text-slate-600 mb-4 md:mb-6">Download all modules as a JSON file.</p>
                            </div>
                            <button onclick="exportJSON()" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition shadow flex justify-center items-center text-sm md:text-base">
                                <i class="fas fa-download mr-2"></i> Download Data
                            </button>
                        </div>
                    </div>
                </div>
            `;
  }

  function handleFileUpload(event) {
   const file = event.target.files[0]; if (!file) return;
   const reader = new FileReader();
   reader.onload = (e) => {
    try {
     const data = JSON.parse(e.target.result);
     if (!Array.isArray(data)) throw new Error("Format error");
     data.forEach(t => {
      if (t.title && t.questions) {
       topics.push({ id: 't-custom-' + Date.now() + Math.random().toString(36).substring(2, 7), title: t.title, description: t.description || '', type: 'Custom', bestScore: null, questions: t.questions });
      }
     });
     saveData(); nav('dashboard');
    } catch (err) { alert('Invalid JSON format.'); }
   };
   reader.readAsText(file);
  }

  function exportJSON() {
   const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(topics, null, 2));
   const a = document.createElement('a'); a.href = dataStr; a.download = "safelearn_backup.json";
   document.body.appendChild(a); a.click(); a.remove();
  }

  // --- View 4 & 5: Quiz Player & Results ---
  function startTopic(id) { currentTopic = topics.find(t => t.id === id); quizState = { index: 0, score: 0 }; nav('player'); }

  function renderPlayer(container) {
   container.innerHTML = `
                <div class="max-w-3xl mx-auto w-full p-4 md:p-6 flex flex-col min-h-screen fade-in pb-20">
                    <button onclick="nav('dashboard')" class="text-slate-500 hover:text-slate-800 mb-4 md:mb-6 font-bold transition w-fit bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-lg shadow-sm border border-slate-200 text-sm md:text-base"><i class="fas fa-arrow-left mr-2"></i> Exit</button>
                    <div class="bg-white p-5 md:p-8 rounded-2xl shadow-xl border border-slate-100 flex-grow relative flex flex-col">
                        <div class="w-full bg-slate-100 rounded-full h-2 md:h-3 mb-6 md:mb-8 overflow-hidden"><div id="progress-bar" class="bg-indigo-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div></div>
                        <div class="flex justify-between items-center mb-6 md:mb-8 pb-3 md:pb-4 border-b border-slate-100">
                            <span id="q-count" class="text-xs md:text-sm font-bold text-slate-400 uppercase"></span>
                            <span id="q-score" class="text-indigo-700 bg-indigo-50 border border-indigo-100 font-bold px-3 py-1 md:px-4 md:py-1.5 rounded-full shadow-sm text-xs md:text-sm"></span>
                        </div>
                        <h2 id="q-text" class="text-xl md:text-2xl font-extrabold text-slate-800 mb-6 md:mb-8 leading-relaxed"></h2>
                        <div id="q-options" class="space-y-3 md:space-y-4 flex-grow"></div>
                        <div id="q-feedback" class="hidden mt-6 md:mt-8 p-4 md:p-5 rounded-xl border-l-4 shadow-sm"><p id="q-feedback-text" class="font-medium text-sm md:text-base"></p></div>
                        <div class="mt-6 md:mt-8 flex justify-end"><button id="btn-next" onclick="nextQuestion()" class="hidden bg-slate-900 hover:bg-indigo-600 text-white font-bold py-3 md:py-4 px-6 md:px-8 rounded-xl shadow-lg transition md:transform md:hover:scale-105 text-sm md:text-base w-full md:w-auto">Continue <i class="fas fa-arrow-right ml-2"></i></button></div>
                    </div>
                </div>`;
   loadQuestion();
  }

  function loadQuestion() {
   document.getElementById('q-feedback').classList.add('hidden'); document.getElementById('btn-next').classList.add('hidden');
   const q = currentTopic.questions[quizState.index]; const total = currentTopic.questions.length;
   document.getElementById('q-text').innerText = q.q;
   document.getElementById('q-count').innerText = `Q ${quizState.index + 1} of ${total}`;
   document.getElementById('q-score').innerText = `Score: ${quizState.score}`;
   document.getElementById('progress-bar').style.width = `${(quizState.index / total) * 100}%`;

   const opts = document.getElementById('q-options'); opts.innerHTML = '';
   q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.innerHTML = `<span class="bg-slate-100 text-slate-500 rounded px-2.5 py-1 mr-3 text-xs md:text-sm font-bold border border-slate-200 flex-shrink-0">${String.fromCharCode(65 + idx)}</span> <span class="text-left w-full text-sm md:text-base">${opt}</span>`;
    btn.className = "w-full flex items-center p-3 md:p-4 border-2 border-slate-200 rounded-xl hover:border-indigo-400 transition bg-white text-slate-700 font-semibold focus:outline-none min-h-[3rem]";
    btn.onclick = () => selectAnswer(idx, btn, q); opts.appendChild(btn);
   });
  }

  function selectAnswer(sIdx, btn, q) {
   const allBtns = document.getElementById('q-options').querySelectorAll('button');
   allBtns.forEach(b => { b.disabled = true; b.classList.add('opacity-50', 'cursor-not-allowed'); b.classList.remove('hover:border-indigo-400'); });

   if (sIdx === q.correct) {
    btn.classList.replace('border-slate-200', 'border-emerald-500'); btn.classList.add('bg-emerald-50', 'text-emerald-900'); btn.classList.remove('opacity-50');
    quizState.score++; document.getElementById('q-score').innerText = `Score: ${quizState.score}`;
    showFeedback("Correct Concept!", q.exp, "emerald");
   } else {
    btn.classList.replace('border-slate-200', 'border-red-500'); btn.classList.add('bg-red-50', 'text-red-900'); btn.classList.remove('opacity-50');
    allBtns[q.correct].classList.replace('border-slate-200', 'border-emerald-500'); allBtns[q.correct].classList.add('bg-emerald-50', 'text-emerald-900', 'border-2'); allBtns[q.correct].classList.remove('opacity-50');
    showFeedback("Review Needed.", q.exp, "red");
   }
   document.getElementById('btn-next').classList.remove('hidden');
  }

  function showFeedback(title, text, color) {
   const fb = document.getElementById('q-feedback');
   fb.className = `mt-6 md:mt-8 p-4 md:p-5 rounded-xl border-l-4 bg-${color}-50 border-${color}-500`;
   document.getElementById('q-feedback-text').innerHTML = `<strong class="text-${color}-800 block mb-1 text-base md:text-lg"><i class="fas fa-${color === 'emerald' ? 'check' : 'times'}-circle mr-2"></i>${title}</strong><span class="text-slate-700 leading-relaxed text-sm md:text-base">${text}</span>`;
   fb.classList.remove('hidden');
  }

  function nextQuestion() {
   quizState.index++;
   if (quizState.index < currentTopic.questions.length) loadQuestion();
   else {
    if (currentTopic.bestScore === null || quizState.score > currentTopic.bestScore) { currentTopic.bestScore = quizState.score; saveData(); }
    nav('results');
   }
  }

  function renderResults(container) {
   const pct = Math.round((quizState.score / currentTopic.questions.length) * 100);
   container.innerHTML = `
                <div class="h-full flex items-center justify-center p-4 md:p-6 fade-in">
                    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-md w-full text-center p-6 md:p-10 relative border border-slate-100">
                        <i class="fas fa-award text-5xl md:text-6xl ${pct >= 80 ? 'text-emerald-400' : 'text-indigo-400'} mb-4 md:mb-6 drop-shadow-md"></i>
                        <h2 class="text-2xl md:text-3xl font-black text-slate-800 mb-1 md:mb-2">Module Complete</h2>
                        <p class="text-slate-500 mb-6 md:mb-8 font-medium text-sm md:text-base">${currentTopic.title}</p>
                        <div class="text-5xl md:text-6xl font-black text-slate-800 mb-6 md:mb-8">${pct}%</div>
                        <button onclick="nav('dashboard')" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-3 md:py-4 rounded-xl transition shadow-lg text-base md:text-lg">Return to Dashboard</button>
                    </div>
                </div>`;
  }

  // Boot
  initApp();
 </script>
</body>

</html>
